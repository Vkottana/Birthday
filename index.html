<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Jayani 🎂</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  color:gold;
  font-family:Arial;
  text-align:center;
}

/* text */
.center-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
  line-height:1.8;
}

/* floating circular photos */
.photo{
  position:fixed;
  bottom:-100px;
  width:70px;
  height:70px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid gold;
  animation:floatCircle linear forwards;
}

/* animation */
@keyframes floatCircle{
  0%{
    transform:translateY(0) rotate(0deg) scale(1);
    opacity:1;
  }
  50%{
    transform:translateY(-50vh) rotate(180deg) scale(1.1);
  }
  100%{
    transform:translateY(-120vh) rotate(360deg) scale(1);
    opacity:0;
  }
}

/* button */
button{
  padding:15px 30px;
  border:none;
  border-radius:30px;
  font-size:18px;
  cursor:pointer;
  margin:10px;
}

#start{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div id="start">
  <h1>🎂 Happy Birthday Jayani Bangaram 🎂</h1>
  <button onclick="start()">START 🎉</button>
</div>

<div class="center-text" id="msg" style="display:none;">
  <h2>Dear Jayani Bangaram 💖</h2>
  <p>Our future AI Engineer 👩‍💻🤖</p>
  <p>Keep learning and growing 🚀</p>
  <p>We are proud of you ❤️</p>
</div>

<script>

const images = [
  "1.JPG","2.JPG","3.JPG","4.jpeg","5.jpg","6.jpg","7.jpg","9.jpg"
];

let audio;

// start
function start(){
  document.getElementById("start").style.display="none";
  document.getElementById("msg").style.display="block";

  playMusic();
  startPhotos();
}

// music fix
function playMusic(){
  audio = new Audio("kesariya.mp3");
  audio.loop = true;

  audio.play().catch(()=>{
    document.body.addEventListener("click", ()=>{
      audio.play();
    }, {once:true});
  });
}

// photo animation
function createPhoto(){
  const img = document.createElement("img");
  img.className = "photo";

  img.src = images[Math.floor(Math.random()*images.length)];
  img.style.left = Math.random()*100 + "vw";

  img.style.animationDuration = (Math.random()*5 + 6) + "s";

  document.body.appendChild(img);

  setTimeout(()=>img.remove(),10000);
}

function startPhotos(){
  for(let i=0;i<20;i++){
    setTimeout(createPhoto, i*200);
  }
  setInterval(createPhoto,400);
}

</script>

</body>
</html>
