<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Jayani 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(145deg, #0a0504, #000000);
}

/* ---------- START SCREEN (RESTORED PREMIUM) ---------- */
#start{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.premium-card{
  background: rgba(0,0,0,0.9);
  padding:40px;
  border-radius:25px;
  border:2px solid gold;
  box-shadow:0 0 60px rgba(255,215,0,0.4);
  text-align:center;
}

.title{
  font-size:32px;
  color:#ffd700;
  font-family:'Playfair Display';
}

.name{
  font-size:42px;
  color:white;
  margin:10px 0;
}

.tag{
  color:#e0c080;
  font-size:18px;
}

.divider{
  height:1px;
  background:linear-gradient(to right, transparent, gold, transparent);
  margin:20px 0;
}

.btnRow{
  display:flex;
  justify-content:center;
  gap:20px;
}

button{
  padding:15px 30px;
  border:none;
  border-radius:40px;
  font-size:18px;
  cursor:pointer;
}

#yes{
  background:gold;
  font-weight:bold;
}

#no{
  background:#333;
  color:white;
}

/* ---------- FINAL SCREEN ---------- */
#final{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:gold;
  font-size:28px;
}

/* ---------- FLOATING PHOTOS ---------- */
.floating-photo{
  position:fixed;
  bottom:-100px;
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid gold;
  animation:floatUp linear forwards;
}

@keyframes floatUp{
  0%{
    transform:translateY(0);
    opacity:0;
  }
  10%{
    opacity:1;
  }
  100%{
    transform:translateY(-120vh);
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- START -->
<div id="start">
  <div class="premium-card">
    <div class="title">🎂 Happy Birthday</div>
    <div class="name">Jayani Bangaram 🎂</div>
    <div class="tag">Future AI Engineer 👩‍💻🤖</div>

    <div class="divider"></div>

    <div class="btnRow">
      <button id="yes">🎉 START 🎉</button>
      <button id="no">WAIT 😜</button>
    </div>
  </div>
</div>

<!-- FINAL -->
<div id="final">
  Enjoy your special day 🎁
</div>

<script>

const images = [
  "1.JPG","2.JPG","3.JPG","4.jpeg","5.jpg","6.jpg","7.jpg","9.jpg"
];

const yes = document.getElementById("yes");
const no = document.getElementById("no");

let audio;
let photoInterval;

/* START */
yes.onclick = function(){
  document.getElementById("start").style.display="none";
  document.getElementById("final").style.display="flex";

  startPhotos();
  playMusic();
};

/* NO BUTTON */
no.onclick = function(){
  no.style.position="absolute";
  no.style.left=Math.random()*80+"%";
  no.style.top=Math.random()*80+"%";
};

/* MUSIC */
function playMusic(){
  audio = new Audio("kesariya.mp3");
  audio.loop = true;
  audio.volume = 0.5;

  audio.play().catch(()=>{
    document.body.addEventListener("click", ()=>{
      audio.play();
    }, { once:true });
  });
}

/* CLEAN PHOTO FLOW */
function createPhoto(){
  const img = document.createElement("img");
  img.className = "floating-photo";

  img.src = images[Math.floor(Math.random()*images.length)];

  const lanes = [10,25,40,55,70,85];
  img.style.left = lanes[Math.floor(Math.random()*lanes.length)] + "vw";

  img.style.animationDuration = (Math.random()*2 + 6) + "s";

  document.body.appendChild(img);

  setTimeout(()=>img.remove(),8000);
}

function startPhotos(){
  if(photoInterval) clearInterval(photoInterval);

  for(let i=0;i<12;i++){
    setTimeout(createPhoto, i*200);
  }

  photoInterval = setInterval(createPhoto, 700);
}

</script>

</body>
</html>
