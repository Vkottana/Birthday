<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Jayani Bangaram 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* KEEP YOUR FULL ORIGINAL CSS — ONLY CHANGE BELOW PART */

.floating-photo-circle{
  position:fixed;
  bottom:-100px;
  width:70px;
  height:70px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #ffd700;
  box-shadow:0 0 25px rgba(255,215,0,0.6);
  animation:floatPhotoCircle 8s linear forwards;
  z-index:1000;
  pointer-events:none;
}

/* FIXED ANIMATION */
@keyframes floatPhotoCircle{
  0%{
    transform:translateY(0) rotate(0deg) scale(1);
    opacity:1;
  }
  50%{
    transform:translateY(-60vh) rotate(180deg) scale(1.1);
  }
  100%{
    transform:translateY(-130vh) rotate(360deg) scale(1);
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- KEEP YOUR FULL ORIGINAL HTML SAME (NO CHANGE) -->

<script>
/* ---------- KEEP YOUR ORIGINAL VARIABLES ---------- */
let audio = null;
let photoInterval = null;

/* ---------- YES BUTTON FIX ---------- */
yesBtn.onclick = function() {
  document.getElementById("start").style.display = "none";
  document.getElementById("final").style.display = "flex";
  document.getElementById("loveMeter").style.display = "flex";
  document.getElementById("memories").style.display = "block";
  
  audio = new Audio("kesariya.mp3");
  audio.loop = true;
  audio.volume = 0.5;

  audio.play().catch(() => {
    document.body.addEventListener("click", () => {
      audio.play();
    }, { once: true });
  });

  // ❌ REMOVED HEARTS (important)
  // startPinkHearts();

  startFloatingCirclePhotos();
  increaseLoveMeter();
  populateReasons();
};

/* ---------- UPDATED IMAGE LIST ---------- */
const photoFiles = [
  "1.JPG","2.JPG","3.JPG","4.jpeg","5.jpg","6.jpg","7.jpg","9.jpg"
];

/* ---------- FIXED FLOATING PHOTOS ---------- */
function createFloatingCirclePhoto() {
  const photo = document.createElement("img");
  photo.className = "floating-photo-circle";
  
  photo.src = photoFiles[Math.floor(Math.random() * photoFiles.length)];
  photo.style.left = Math.random() * 100 + "vw";
  
  const size = Math.floor(Math.random() * 30) + 60;
  photo.style.width = size + "px";
  photo.style.height = size + "px";

  photo.style.animationDuration = (Math.random() * 3 + 6) + "s";

  document.body.appendChild(photo);
  setTimeout(() => photo.remove(), 10000);
}

function startFloatingCirclePhotos() {
  if(photoInterval) clearInterval(photoInterval);

  for(let i=0;i<20;i++){
    setTimeout(createFloatingCirclePhoto, i*150);
  }

  photoInterval = setInterval(createFloatingCirclePhoto, 400);
}
</script>

</body>
</html>
